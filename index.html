<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Shepherd Parish Youth Harvest — 2026 Support Preferences</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,sans-serif;background:#f5f6f8;color:#111827;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:#f0f2f5}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

  /* Shell */
  .shell{width:100%;max-width:960px;background:#f5f6f8;border-radius:16px;overflow:hidden;border:1px solid #e5e7eb;box-shadow:0 20px 60px rgba(0,0,0,0.08)}

  /* Topbar */
  .topbar{height:52px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;position:sticky;top:0;z-index:50}
  .logo-box{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0;border:1px solid #e5e7eb}
  .logo-box img{width:100%;height:100%;object-fit:cover}
  .topbar-brand{font-size:13px;font-weight:600;color:#111827}
  .prog-track{flex:1;height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden;max-width:320px;margin:0 16px}
  .prog-fill{height:100%;background:#1a56db;border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
  .step-pills{display:flex;gap:6px;align-items:center}
  .sp{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
  .sp-done{background:#eff6ff;color:#1a56db}
  .sp-active{background:#1a56db;color:#fff}
  .sp-pending{background:#f3f4f6;color:#9ca3af}
  .sp-num{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
  .sp-done .sp-num{background:#1a56db;color:#fff}
  .sp-active .sp-num{background:rgba(255,255,255,0.2);color:#fff}
  .sp-pending .sp-num{background:#e5e7eb;color:#9ca3af}

  /* Main layout */
  .main{display:flex;min-height:540px}

  /* Left panel */
  .left{width:240px;flex-shrink:0;background:#1a1f2e;padding:28px 20px;display:flex;flex-direction:column;gap:6px}
  .lp-logo{width:60px;height:60px;border-radius:12px;overflow:hidden;margin-bottom:14px;border:2px solid rgba(255,255,255,0.12);flex-shrink:0}
  .lp-logo img{width:100%;height:100%;object-fit:cover}
  .lp-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(26,86,219,0.22);border:1px solid rgba(59,130,246,0.28);border-radius:999px;padding:3px 10px;margin-bottom:10px;width:fit-content}
  .lp-dot{width:5px;height:5px;border-radius:50%;background:#60a5fa;animation:blink 2s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .lp-badge span{font-size:11px;color:#93c5fd;font-weight:500}
  .lp-title{font-size:16px;font-weight:600;color:#fff;line-height:1.35;margin-bottom:4px}
  .lp-sub{font-size:12px;color:#6b7280;line-height:1.5;margin-bottom:18px}
  .ms{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;transition:all 0.2s}
  .ms-current{background:rgba(26,86,219,0.15)}
  .ms-dot{width:7px;height:7px;border-radius:50%;background:#374151;flex-shrink:0;transition:background 0.2s}
  .ms-current .ms-dot{background:#1a56db}
  .ms-complete .ms-dot{background:#93c5fd}
  .ms-label{font-size:12px;color:#4b5563;transition:color 0.2s}
  .ms-current .ms-label{color:#fff;font-weight:500}
  .ms-complete .ms-label{color:#6b7280}
  .lp-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;margin-top:auto}
  .lp-stat-val{font-size:20px;font-weight:700;color:#fff}
  .lp-stat-label{font-size:11px;color:#6b7280;margin-top:2px}

  /* Right panel */
  .right{flex:1;background:#f5f6f8;display:flex;align-items:flex-start;justify-content:center;padding:36px 32px;overflow-y:auto}
  .step-wrap{width:100%;max-width:460px;animation:stepIn 0.3s cubic-bezier(0.16,1,0.3,1)}
  @keyframes stepIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  /* Form elements */
  .step-eyebrow{font-size:11px;font-weight:600;color:#1a56db;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
  .step-h{font-size:22px;font-weight:700;color:#111827;line-height:1.25;margin-bottom:6px}
  .step-desc{font-size:13px;color:#6b7280;margin-bottom:28px;line-height:1.6}
  .field-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;display:block;letter-spacing:0.02em}
  .req{color:#ef4444;margin-left:2px}
  .fg{margin-bottom:20px}

  .big-input{width:100%;background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:14px 16px;font-size:14px;color:#111827;font-family:inherit;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
  .big-input:hover{border-color:#bfdbfe}
  .big-input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,0.1)}
  .big-input.is-error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,0.08)}
  textarea.big-input{min-height:90px;resize:vertical}

  /* Option cards */
  .oc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .oc{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:14px 12px;cursor:pointer;transition:all 0.2s;position:relative;display:flex;flex-direction:column;align-items:flex-start}
  .oc:hover{border-color:#93c5fd;background:#f8faff}
  .oc.chosen{border-color:#1a56db;background:#eff6ff;box-shadow:0 0 0 3px rgba(26,86,219,0.08)}
  .oc-icon{width:34px;height:34px;border-radius:9px;background:#f3f4f6;color:#6b7280;display:flex;align-items:center;justify-content:center;margin-bottom:10px;transition:all 0.2s;font-size:16px}
  .oc.chosen .oc-icon{background:#dbeafe;color:#1a56db}
  .oc-check{position:absolute;top:10px;right:10px;width:16px;height:16px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:9px;color:transparent}
  .oc.chosen .oc-check{border-color:#1a56db;background:#1a56db;color:#fff}
  .oc-name{font-size:13px;font-weight:600;color:#111827}
  .oc-sub{font-size:11px;color:#9ca3af;margin-top:2px}

  /* Radio list */
  .radio-list{display:flex;flex-direction:column;gap:6px}
  .ri{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s}
  .ri:hover{border-color:#93c5fd;background:#f8faff}
  .ri.chosen{border-color:#1a56db;background:#eff6ff}
  .ri-dot{width:17px;height:17px;border-radius:50%;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .ri.chosen .ri-dot{border-color:#1a56db}
  .ri-inner{width:7px;height:7px;border-radius:50%;background:#1a56db;opacity:0;transition:opacity 0.2s}
  .ri.chosen .ri-inner{opacity:1}
  .ri-icon{font-size:15px;color:#9ca3af;flex-shrink:0;transition:color 0.2s}
  .ri.chosen .ri-icon{color:#1a56db}
  .ri-text{font-size:13px;color:#374151;font-weight:500}

  /* Chips */
  .chip-row{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border:1.5px solid #e5e7eb;border-radius:999px;font-size:12px;font-weight:500;color:#374151;cursor:pointer;background:#fff;transition:all 0.2s;user-select:none}
  .chip:hover{border-color:#93c5fd;background:#f8faff}
  .chip.chosen{background:#1a56db;border-color:#1a56db;color:#fff}

  /* Amount cards */
  .amt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .amt{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:#374151;transition:all 0.2s}
  .amt:hover{border-color:#93c5fd;background:#f8faff}
  .amt.chosen{border-color:#1a56db;background:#eff6ff;color:#1a56db}

  /* Toggle */
  .toggle-row{display:flex;gap:7px}
  .tog{flex:1;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;text-align:center;font-size:13px;font-weight:500;color:#374151;cursor:pointer;background:#fff;transition:all 0.2s}
  .tog:hover{border-color:#93c5fd;background:#f8faff}
  .tog.chosen{border-color:#1a56db;background:#1a56db;color:#fff}

  /* Error */
  .err-msg{font-size:11px;color:#ef4444;margin-top:5px;display:flex;align-items:center;gap:4px}

  /* Navigation buttons */
  .nav{display:flex;align-items:center;gap:8px;margin-top:8px}
  .btn-back{width:42px;height:42px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b7280;transition:all 0.15s;flex-shrink:0;font-size:16px}
  .btn-back:hover{border-color:#1a56db;color:#1a56db;background:#f8faff}
  .btn-next{flex:1;padding:13px 20px;border-radius:10px;border:none;cursor:pointer;background:#1a56db;color:#fff;font-size:14px;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s,transform 0.1s}
  .btn-next:hover{background:#1648c0;transform:translateY(-1px)}
  .btn-next:active{transform:translateY(0)}
  .btn-submit{flex:1;padding:13px 20px;border-radius:10px;border:none;cursor:pointer;background:#059669;color:#fff;font-size:14px;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s}
  .btn-submit:hover{background:#047857}

  /* Review */
  .review-block{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:12px}
  .review-head{background:#f8faff;padding:10px 16px;border-bottom:1px solid #e5e7eb;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#1a56db;font-weight:600}
  .review-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;border-bottom:1px solid #f3f4f6;gap:12px}
  .review-row:last-child{border-bottom:none}
  .review-k{font-size:12px;color:#6b7280}
  .review-v{font-size:12px;color:#111827;font-weight:500;text-align:right;max-width:60%}

  /* Success */
  .success-wrap{text-align:center;padding:20px 0}
  .s-circle{width:72px;height:72px;border-radius:50%;background:#1a56db;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin:0 auto 20px}
  .badge-row{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:999px;padding:6px 16px;font-size:12px;font-weight:500;color:#1a56db;margin-top:16px}
  .limit-badge{font-size:10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:999px;padding:2px 8px;color:#c2410c;margin-left:6px;font-weight:600}

  /* Intro checklist */
  .intro-list{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:24px}
  .intro-item{display:flex;align-items:center;gap:10px;padding:7px 0}
  .intro-item+.intro-item{border-top:1px solid #f3f4f6}
  .intro-num{width:22px;height:22px;border-radius:6px;background:#eff6ff;color:#1a56db;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .intro-text{font-size:13px;color:#374151}

  /* Responsive */
  @media(max-width:768px){
    body{padding:0}
    .shell{border-radius:0;border:none;box-shadow:none}
    .main{flex-direction:column}
    .left{width:100%;padding:20px 16px}
    .lp-logo{width:44px;height:44px}
    .lp-sub{display:none}
    .right{padding:24px 16px}
    .step-pills{display:none}
  }
  @media(max-width:480px){
    .oc-grid{grid-template-columns:1fr}
    .toggle-row{flex-wrap:wrap}
  }
</style>
</head>
<body>

<div class="shell">
  <!-- Top bar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-box">
        <img src="https://i.imgur.com/placeholder.png" alt="Good Shepherd Parish" id="topbar-logo" onerror="this.parentElement.innerHTML='<div style=\'width:34px;height:34px;background:#1a56db;border-radius:8px;display:flex;align-items:center;justify-content:center;\'><i class=\'ti ti-cross\' style=\'color:#fff;font-size:14px\'></i></div>'">
      </div>
      <span class="topbar-brand">Good Shepherd</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog" style="width:0%"></div>
    </div>
    <div class="step-pills" id="pills"></div>
  </div>

  <!-- Main layout -->
  <div class="main">
    <!-- Sidebar -->
    <div class="left">
      <div class="lp-logo">
        <img src="https://i.imgur.com/placeholder.png" alt="Good Shepherd Parish" id="sidebar-logo" onerror="this.parentElement.innerHTML='<div style=\'width:60px;height:60px;background:rgba(26,86,219,0.3);border-radius:12px;display:flex;align-items:center;justify-content:center;\'><i class=\'ti ti-cross\' style=\'color:#93c5fd;font-size:24px\'></i></div>'">
      </div>
      <div class="lp-badge"><div class="lp-dot"></div><span>2026 Harvest</span></div>
      <div class="lp-title">Parish Youth Harvest</div>
      <div class="lp-sub">Good Shepherd Catholic Church<br>Tema Community 2</div>
      <div id="side-steps"></div>
      <div class="lp-stat" style="margin-top:auto">
        <div class="lp-stat-val">GH¢70,000</div>
        <div class="lp-stat-label">2026 fundraising goal</div>
      </div>
    </div>

    <!-- Right content -->
    <div class="right">
      <div class="step-wrap" id="step-body"></div>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const STEPS = [
  {label:'Welcome'},{label:'Your profile'},{label:'Giving method'},{label:'Pledge'},
  {label:'Activities'},{label:'Engagement'},{label:'Preferred times'},{label:'Updates'},
  {label:'Contact'},{label:'Review'}
];

const D = {
  role:'', roleOther:'',
  method:'', methodOther:'',
  pledgeFreq:'', pledgeAmt:'',
  activities:[],
  livestream:'',
  times:[], timesOther:'',
  updates:[],
  suggestions:'',
  name:'', phone:'', email:''
};

let step = 0;
let errs = {};

// Persist across refresh
try { const s = localStorage.getItem('gs26_v2'); if(s) Object.assign(D, JSON.parse(s)); } catch(e) {}
function save() { try { localStorage.setItem('gs26_v2', JSON.stringify(D)); } catch(e) {} }

// ─── Validation ───────────────────────────────────────────────────────────────
function validate(s) {
  const e = {};
  if(s===1) {
    if(!D.role) e.role = 'Please select who you are.';
    if(D.role==='Other' && !D.roleOther.trim()) e.roleOther = 'Please specify.';
  }
  if(s===2) {
    if(!D.method) e.method = 'Please select a giving method.';
    if(D.method==='Other' && !D.methodOther.trim()) e.methodOther = 'Please specify.';
  }
  if(s===3) {
    if(!D.pledgeFreq) e.pledgeFreq = 'Please select an option.';
    if(D.pledgeFreq && D.pledgeFreq!=='No' && !D.pledgeAmt) e.pledgeAmt = 'Please select an amount.';
  }
  if(s===4) { if(!D.activities.length) e.activities = 'Please select at least one activity.'; }
  if(s===5) { if(!D.livestream) e.livestream = 'Please select an option.'; }
  if(s===8) {
    if(D.phone && !/^(0[235][0-9]{8}|\+233[235][0-9]{8})$/.test(D.phone.replace(/\s/g,'')))
      e.phone = 'Enter a valid Ghana number (e.g. 0241234567).';
    if(D.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(D.email))
      e.email = 'Enter a valid email address.';
  }
  return e;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function next() {
  const e = validate(step);
  if(Object.keys(e).length) { errs = e; render(); return; }
  errs = {};
  step++;
  save();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function back() { step--; errs = {}; render(); window.scrollTo({top:0, behavior:'smooth'}); }
function submitForm() {
  const e = validate(step);
  if(Object.keys(e).length) { errs = e; render(); return; }
  step = 10;
  try { localStorage.removeItem('gs26_v2'); } catch(e2) {}
  render();
}

// ─── Global event handlers ────────────────────────────────────────────────────
window.setRole    = v => { D.role=v; errs.role=''; render(); };
window.setMethod  = v => { D.method=v; errs.method=''; render(); };
window.setPFreq   = v => { D.pledgeFreq=v; errs.pledgeFreq=''; if(v==='No') D.pledgeAmt=''; render(); };
window.setPAmt    = v => { D.pledgeAmt=v; errs.pledgeAmt=''; render(); };
window.toggleAct  = v => {
  const a=D.activities, i=a.indexOf(v);
  if(i>-1) a.splice(i,1); else if(a.length<3) a.push(v);
  errs.activities=''; render();
};
window.setLive    = v => { D.livestream=v; errs.livestream=''; render(); };
window.toggleTime = v => { const t=D.times, i=t.indexOf(v); if(i>-1) t.splice(i,1); else t.push(v); render(); };
window.toggleUpd  = v => { const u=D.updates, i=u.indexOf(v); if(i>-1) u.splice(i,1); else u.push(v); render(); };
window.setField   = (f,v) => { D[f]=v; save(); };

// ─── Helpers ──────────────────────────────────────────────────────────────────
function eMsg(k) {
  return errs[k] ? `<div class="err-msg"><i class="ti ti-alert-circle"></i>${errs[k]}</div>` : '';
}
function navRow(showBack=true, isLast=false) {
  const back = showBack ? `<button class="btn-back" onclick="back()" aria-label="Go back"><i class="ti ti-arrow-left"></i></button>` : '';
  const fwd  = isLast
    ? `<button class="btn-submit" onclick="submitForm()"><i class="ti ti-check"></i> Submit response</button>`
    : `<button class="btn-next" onclick="next()">Continue <i class="ti ti-arrow-right"></i></button>`;
  return `<div class="nav">${back}${fwd}</div>`;
}

// ─── Step renders ─────────────────────────────────────────────────────────────
function renderSuccess() {
  return `
  <div class="success-wrap">
    <div class="s-circle"><i class="ti ti-check"></i></div>
    <div style="font-size:22px;font-weight:700;color:#111827;margin-bottom:8px">Response submitted!</div>
    <div style="font-size:13px;color:#6b7280;line-height:1.7;max-width:340px;margin:0 auto">
      Thank you for your support. The Good Shepherd Youth Harvest team will use your input to plan a meaningful 2026 event.
    </div>
    <p style="margin-top:12px;font-size:13px;color:#6b7280">May God bless your generosity and commitment to our parish. 🙏</p>
    <div class="badge-row"><i class="ti ti-heart"></i> Good Shepherd Catholic Church, Tema Community 2</div>
  </div>`;
}

function renderStep0() {
  return `
  <div class="step-eyebrow">Welcome</div>
  <div class="step-h">2026 Parish Youth Harvest</div>
  <div class="step-desc">Help us plan an impactful fundraising harvest. This 3–5 minute survey lets us understand how parishioners would like to participate and give toward our GH¢70,000 goal by November 30, 2026.</div>
  <div class="intro-list">
    <div style="font-size:12px;color:#6b7280;margin-bottom:10px;font-weight:500">What to expect</div>
    ${['Your parish profile','Giving & pledge preferences','Activities & engagement','Optional contact details'].map((t,i)=>`
      <div class="intro-item">
        <div class="intro-num">${i+1}</div>
        <span class="intro-text">${t}</span>
      </div>`).join('')}
  </div>
  <div class="nav" style="justify-content:flex-end">
    <button class="btn-next" onclick="next()">Get started <i class="ti ti-arrow-right"></i></button>
  </div>`;
}

function renderStep1() {
  const roles = [
    ['Weekly parishioner','ti-home-church','Weekly parishioner','Regular Sunday attendee'],
    ['Monthly parishioner','ti-calendar','Monthly parishioner','Monthly attendee'],
    ['Occasional attendee','ti-clock','Occasional attendee','Sometimes present'],
    ['Youth (15–35)','ti-users','Youth (15–35)','Parish youth member'],
    ['Local business/vendor','ti-building-store','Business / vendor','Local entrepreneur'],
    ['Other','ti-dots-circle-horizontal','Other','Something else']
  ];
  return `
  <div class="step-eyebrow">Step 1 of 9</div>
  <div class="step-h">Who are you?</div>
  <div class="step-desc">Help us understand your connection to the parish.</div>
  <div class="fg">
    <label class="field-label">Which best describes you? <span class="req">*</span></label>
    <div class="oc-grid">
      ${roles.map(([val,icon,name,sub])=>`
        <div class="oc${D.role===val?' chosen':''}" onclick="setRole('${val}')">
          <div class="oc-icon"><i class="ti ${icon}"></i></div>
          <div class="oc-check"><i class="ti ti-check"></i></div>
          <div class="oc-name">${name}</div>
          <div class="oc-sub">${sub}</div>
        </div>`).join('')}
    </div>
    ${eMsg('role')}
    ${D.role==='Other'?`<input class="big-input${errs.roleOther?' is-error':''}" style="margin-top:10px" placeholder="Please specify..." value="${D.roleOther}" oninput="D.roleOther=this.value;errs.roleOther=''"> ${eMsg('roleOther')}`:''}
  </div>
  ${navRow(false)}`;
}

function renderStep2() {
  const methods = [
    ['Cash at church','ti-banknote'],
    ['Mobile money','ti-device-mobile'],
    ['Online donation','ti-world'],
    ['Bank transfer','ti-building-bank'],
    ['Instalment pledge','ti-calendar-repeat'],
    ['Other','ti-dots']
  ];
  return `
  <div class="step-eyebrow">Step 2 of 9</div>
  <div class="step-h">How would you give?</div>
  <div class="step-desc">Choose the giving method most convenient for you.</div>
  <div class="fg">
    <label class="field-label">Preferred method of giving <span class="req">*</span></label>
    <div class="radio-list">
      ${methods.map(([val,icon])=>`
        <div class="ri${D.method===val?' chosen':''}" onclick="setMethod('${val}')">
          <div class="ri-dot"><div class="ri-inner"></div></div>
          <i class="ti ${icon} ri-icon"></i>
          <span class="ri-text">${val}</span>
        </div>`).join('')}
    </div>
    ${eMsg('method')}
    ${D.method==='Other'?`<input class="big-input${errs.methodOther?' is-error':''}" style="margin-top:10px" placeholder="Please specify..." value="${D.methodOther}" oninput="D.methodOther=this.value"> ${eMsg('methodOther')}`:''}
  </div>
  ${navRow()}`;
}

function renderStep3() {
  const amts = ['< GH¢100','GH¢100 – GH¢500','GH¢500 – GH¢2,000','GH¢2,000 – GH¢5,000','> GH¢5,000'];
  return `
  <div class="step-eyebrow">Step 3 of 9</div>
  <div class="step-h">Pledge details</div>
  <div class="step-desc">Would you like to make a financial pledge toward the harvest goal?</div>
  <div class="fg">
    <label class="field-label">Willing to pledge? <span class="req">*</span></label>
    <div class="toggle-row">
      ${['Monthly','Quarterly','One-time','No'].map(v=>`<div class="tog${D.pledgeFreq===v?' chosen':''}" onclick="setPFreq('${v}')">${v}</div>`).join('')}
    </div>
    ${eMsg('pledgeFreq')}
  </div>
  ${D.pledgeFreq && D.pledgeFreq!=='No' ? `
  <div class="fg">
    <label class="field-label">Pledge amount range <span class="req">*</span></label>
    <div class="amt-grid">
      ${amts.map(a=>`<div class="amt${D.pledgeAmt===a?' chosen':''}" onclick="setPAmt('${a}')">${a}</div>`).join('')}
    </div>
    ${eMsg('pledgeAmt')}
  </div>` : ''}
  ${navRow()}`;
}

function renderStep4() {
  const acts = ['Concert / Dinner','Market day','Sponsorship','Online giving','Door-to-door','Volunteer'];
  const cnt = D.activities.length;
  return `
  <div class="step-eyebrow">Step 4 of 9</div>
  <div class="step-h">Activities</div>
  <div class="step-desc">Which harvest activities would you join or support? <span class="limit-badge">Max 3</span></div>
  <div class="fg">
    <label class="field-label">Select activities <span class="req">*</span></label>
    <div class="chip-row">
      ${acts.map(val=>{
        const sel = D.activities.includes(val);
        const dis = !sel && cnt >= 3;
        return `<div class="chip${sel?' chosen':''}" style="${dis?'opacity:0.4;cursor:not-allowed':''}" onclick="${!dis?`toggleAct('${val}')`:''}">${sel?'<i class="ti ti-check" style="font-size:11px"></i> ':''}${val}</div>`;
      }).join('')}
    </div>
    <div style="font-size:11px;color:#9ca3af;margin-top:8px">${cnt}/3 selected</div>
    ${eMsg('activities')}
  </div>
  ${navRow()}`;
}

function renderStep5() {
  return `
  <div class="step-eyebrow">Step 5 of 9</div>
  <div class="step-h">Livestream giving</div>
  <div class="step-desc">We're exploring a live donation stream during harvest events. Would you participate?</div>
  <div class="fg">
    <label class="field-label">Interest in livestream donation <span class="req">*</span></label>
    <div class="toggle-row">
      ${['Yes','Maybe','No'].map(v=>`<div class="tog${D.livestream===v?' chosen':''}" onclick="setLive('${v}')">${v}</div>`).join('')}
    </div>
    ${eMsg('livestream')}
  </div>
  ${navRow()}`;
}

function renderStep6() {
  const times = ['Weekday evenings','Saturday','Sunday','Other'];
  return `
  <div class="step-eyebrow">Step 6 of 9</div>
  <div class="step-h">Preferred times</div>
  <div class="step-desc">When are you most available for harvest activities?</div>
  <div class="fg">
    <label class="field-label">Select all that apply</label>
    <div class="chip-row">
      ${times.map(t=>{
        const sel = D.times.includes(t);
        return `<div class="chip${sel?' chosen':''}" onclick="toggleTime('${t}')">${sel?'<i class="ti ti-check" style="font-size:11px"></i> ':''}${t}</div>`;
      }).join('')}
    </div>
    ${D.times.includes('Other')?`<input class="big-input" style="margin-top:10px" placeholder="Specify preferred time..." value="${D.timesOther}" oninput="D.timesOther=this.value">`:''}
  </div>
  ${navRow()}`;
}

function renderStep7() {
  const prefs = ['WhatsApp','SMS','Email','No thanks'];
  return `
  <div class="step-eyebrow">Step 7 of 9</div>
  <div class="step-h">Suggestions & updates</div>
  <div class="step-desc">Share ideas and tell us how to keep you informed.</div>
  <div class="fg">
    <label class="field-label">Your suggestions or ideas for the Harvest</label>
    <textarea class="big-input" placeholder="Share any ideas for the 2026 harvest..." oninput="setField('suggestions',this.value)">${D.suggestions}</textarea>
  </div>
  <div class="fg">
    <label class="field-label">How should we send you updates?</label>
    <div class="chip-row">
      ${prefs.map(p=>{
        const sel = D.updates.includes(p);
        return `<div class="chip${sel?' chosen':''}" onclick="toggleUpd('${p}')">${sel?'<i class="ti ti-check" style="font-size:11px"></i> ':''}${p}</div>`;
      }).join('')}
    </div>
  </div>
  ${navRow()}`;
}

function renderStep8() {
  return `
  <div class="step-eyebrow">Step 8 of 9</div>
  <div class="step-h">Contact details</div>
  <div class="step-desc">All optional — only for personalised follow-up from the harvest team.</div>
  <div class="fg">
    <label class="field-label">Your name</label>
    <input class="big-input" placeholder="Full name..." value="${D.name}" oninput="setField('name',this.value)">
  </div>
  <div class="fg">
    <label class="field-label">Phone number <span style="color:#9ca3af;font-weight:400">(Ghana format)</span></label>
    <input class="big-input${errs.phone?' is-error':''}" type="tel" placeholder="e.g. 0241234567" value="${D.phone}" oninput="setField('phone',this.value)">
    ${eMsg('phone')}
  </div>
  <div class="fg">
    <label class="field-label">Email address</label>
    <input class="big-input${errs.email?' is-error':''}" type="email" placeholder="your@email.com" value="${D.email}" oninput="setField('email',this.value)">
    ${eMsg('email')}
  </div>
  ${navRow()}`;
}

function renderStep9() {
  function rrow(k, v) {
    if(!v || (Array.isArray(v) && !v.length)) return '';
    return `<div class="review-row"><span class="review-k">${k}</span><span class="review-v">${Array.isArray(v)?v.join(', '):v}</span></div>`;
  }
  const timesDisplay = [
    ...D.times.filter(t=>t!=='Other'),
    ...(D.times.includes('Other') && D.timesOther ? [D.timesOther] : [])
  ];
  return `
  <div class="step-eyebrow">Step 9 of 9</div>
  <div class="step-h">Review & submit</div>
  <div class="step-desc">Everything look right? Submit when you're ready.</div>

  <div class="review-block">
    <div class="review-head">Profile & giving</div>
    ${rrow('Who you are', D.role==='Other'?D.roleOther:D.role)}
    ${rrow('Giving method', D.method==='Other'?D.methodOther:D.method)}
    ${rrow('Pledge frequency', D.pledgeFreq)}
    ${D.pledgeFreq!=='No'?rrow('Pledge amount', D.pledgeAmt):''}
  </div>

  <div class="review-block">
    <div class="review-head">Engagement</div>
    ${rrow('Activities', D.activities)}
    ${rrow('Livestream interest', D.livestream)}
    ${rrow('Preferred times', timesDisplay)}
  </div>

  <div class="review-block">
    <div class="review-head">Contact & updates</div>
    ${rrow('Update preference', D.updates)}
    ${rrow('Name', D.name)}
    ${rrow('Phone', D.phone)}
    ${rrow('Email', D.email)}
    ${D.suggestions?`<div class="review-row"><span class="review-k">Suggestions</span><span class="review-v" style="max-width:70%;word-break:break-word">${D.suggestions}</span></div>`:''}
  </div>

  <p style="font-size:11px;color:#9ca3af;margin-bottom:12px;line-height:1.6">By submitting, you agree that this information is used solely to plan the 2026 Good Shepherd Youth Harvest.</p>
  ${navRow(true, true)}`;
}

// ─── Progress bar & sidebar ───────────────────────────────────────────────────
function renderPills() {
  const labels = ['Welcome','Profile','Giving','Pledge','Activities','Engage','Times','Updates','Contact','Review'];
  const start  = Math.max(0, step - 1);
  return labels.slice(start, start + 4).map((l, i) => {
    const abs = start + i;
    const cls = abs < step ? 'sp-done' : abs === step ? 'sp-active' : 'sp-pending';
    const num = abs < step ? '<i class="ti ti-check" style="font-size:8px"></i>' : abs + 1;
    return `<div class="sp ${cls}"><div class="sp-num">${num}</div>${l}</div>`;
  }).join('');
}

function renderSide() {
  const labels = ['Welcome','Your profile','Giving method','Pledge','Activities','Engagement','Preferred times','Updates','Contact','Review'];
  return labels.map((l, i) => {
    const cls = i < step ? 'ms-complete' : i === step ? 'ms-current' : '';
    return `<div class="ms ${cls}"><div class="ms-dot"></div><span class="ms-label">${l}</span></div>`;
  }).join('');
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render() {
  const pct = step === 10 ? 100 : Math.round((step / 9) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('pills').innerHTML  = step < 10 ? renderPills() : '';
  document.getElementById('side-steps').innerHTML = renderSide();

  const body = document.getElementById('step-body');
  const steps = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4,
                 renderStep5, renderStep6, renderStep7, renderStep8, renderStep9];

  body.innerHTML = step === 10 ? renderSuccess() : steps[step]();

  // Re-trigger animation
  body.classList.remove('step-wrap');
  void body.offsetWidth;
  body.classList.add('step-wrap');
}

// ─── Logo: Replace placeholder with actual Daban logo ─────────────────────────
// Paste your base64 logo string below in place of PASTE_BASE64_HERE
// e.g. const LOGO_SRC = "data:image/jpeg;base64,/9j/4AAQ...";
const LOGO_SRC = "";  // ← paste base64 here, or a relative/absolute URL
if(LOGO_SRC) {
  document.getElementById('topbar-logo').src  = LOGO_SRC;
  document.getElementById('sidebar-logo').src = LOGO_SRC;
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
