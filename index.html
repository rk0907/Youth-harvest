<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Shepherd Parish Youth Harvest 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
/* ============================================================
BASE RESET
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #f0f2f5;
  color: #111827;
  min-height: 100vh;
  overflow-x: hidden;
}
button, input, textarea { font-family: inherit; }

/* ============================================================
DESIGN TOKENS (Fixed dashes and quotes)
============================================================ */
:root {
  --blue:      #1a56db;
  --blue-dk:   #1445b8;
  --blue-pale: #eff6ff;
  --blue-lt:   #bfdbfe;
  --green:     #059669;
  --green-dk:  #047857;
  --red:       #ef4444;
  --navy:      #1a1f2e;
  --border:    #e5e7eb;
  --muted:     #6b7280;
  --text:      #111827;
  --text2:     #374151;
  --white:     #ffffff;
  --bg:        #f0f2f5;
  --r:         12px;
  --r-sm:      8px;
  --r-pill:    999px;
}

/* ============================================================
SHARED FORM COMPONENTS
============================================================ */

/* Slide-in animation */
@keyframes slideUp {
from { opacity: 0; transform: translateY(14px); }
to   { opacity: 1; transform: translateY(0); }
}
.slide-up { animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1) both; }

/* Step header */
.step-label {
font-size: 11px; font-weight: 700; color: var(–blue);
letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px;
}
.step-title {
font-size: 22px; font-weight: 700; color: var(–text);
line-height: 1.25; margin-bottom: 6px;
}
.step-desc {
font-size: 13px; color: var(–muted);
line-height: 1.65; margin-bottom: 22px;
}

/* Field */
.fg { margin-bottom: 18px; }
.field-label {
display: block; font-size: 12px; font-weight: 600;
color: var(–text2); margin-bottom: 8px; letter-spacing: 0.02em;
}
.req { color: var(–red); margin-left: 2px; }

/* Text input */
.inp {
width: 100%; background: var(–white);
border: 1.5px solid var(–border); border-radius: var(–r);
padding: 13px 15px; font-size: 15px; color: var(–text);
outline: none; -webkit-appearance: none; appearance: none;
transition: border-color 0.18s, box-shadow 0.18s;
}
.inp:focus { border-color: var(–blue); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
.inp.err   { border-color: var(–red);  box-shadow: 0 0 0 3px rgba(239,68,68,0.08); }
textarea.inp { min-height: 90px; resize: vertical; line-height: 1.5; }

/* Error message */
.err-msg {
font-size: 12px; color: var(–red);
margin-top: 6px; display: flex; align-items: center; gap: 4px;
}

/* Option card grid */
.oc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.oc {
background: var(–white); border: 1.5px solid var(–border);
border-radius: var(–r); padding: 13px 11px;
cursor: pointer; position: relative;
display: flex; flex-direction: column;
transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
user-select: none;
}
.oc:active { transform: scale(0.98); }
.oc.on {
border-color: var(–blue); background: var(–blue-pale);
box-shadow: 0 0 0 3px rgba(26,86,219,0.08);
}
.oc-icon {
width: 30px; height: 30px; border-radius: 7px;
background: #f3f4f6; color: var(–muted);
display: flex; align-items: center; justify-content: center;
font-size: 14px; margin-bottom: 8px;
transition: background 0.15s, color 0.15s;
}
.oc.on .oc-icon { background: #dbeafe; color: var(–blue); }
.oc-tick {
position: absolute; top: 8px; right: 8px;
width: 16px; height: 16px; border-radius: 50%;
border: 2px solid #d1d5db;
display: flex; align-items: center; justify-content: center;
font-size: 8px; color: transparent;
transition: all 0.15s;
}
.oc.on .oc-tick { border-color: var(–blue); background: var(–blue); color: var(–white); }
.oc-name { font-size: 12px; font-weight: 600; color: var(–text); }
.oc-sub  { font-size: 10px; color: #9ca3af; margin-top: 2px; }

/* Radio rows */
.radio-list { display: flex; flex-direction: column; gap: 7px; }
.ri {
background: var(–white); border: 1.5px solid var(–border);
border-radius: var(–r-sm); padding: 13px 14px;
cursor: pointer; display: flex; align-items: center; gap: 12px;
transition: border-color 0.15s, background 0.15s;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}
.ri:active { transform: scale(0.99); }
.ri.on { border-color: var(–blue); background: var(–blue-pale); }
.ri-dot {
width: 18px; height: 18px; border-radius: 50%;
border: 2px solid #d1d5db; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
transition: border-color 0.15s;
}
.ri.on .ri-dot { border-color: var(–blue); }
.ri-inner {
width: 8px; height: 8px; border-radius: 50%;
background: var(–blue); opacity: 0; transition: opacity 0.15s;
}
.ri.on .ri-inner { opacity: 1; }
.ri-ico { font-size: 16px; color: #9ca3af; flex-shrink: 0; transition: color 0.15s; }
.ri.on .ri-ico { color: var(–blue); }
.ri-txt { font-size: 14px; font-weight: 500; color: var(–text2); }

/* Chips */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
display: inline-flex; align-items: center; gap: 5px;
padding: 9px 15px; border: 1.5px solid var(–border);
border-radius: var(–r-pill); font-size: 13px; font-weight: 500;
color: var(–text2); background: var(–white);
cursor: pointer; user-select: none;
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}
.chip:active { transform: scale(0.97); }
.chip.on { background: var(–blue); border-color: var(–blue); color: var(–white); }

/* Amount grid */
.amt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.amt {
background: var(–white); border: 1.5px solid var(–border);
border-radius: var(–r-sm); padding: 13px;
cursor: pointer; text-align: center;
font-size: 13px; font-weight: 500; color: var(–text2);
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}
.amt:active { transform: scale(0.98); }
.amt.on { border-color: var(–blue); background: var(–blue-pale); color: var(–blue); }

/* Toggle row */
.tog-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tog {
flex: 1; min-width: 66px; padding: 12px 8px;
border: 1.5px solid var(–border); border-radius: var(–r-sm);
text-align: center; font-size: 13px; font-weight: 500;
color: var(–text2); background: var(–white);
cursor: pointer; transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}
.tog:active { transform: scale(0.97); }
.tog.on { border-color: var(–blue); background: var(–blue); color: var(–white); }

/* Buttons */
.btn-back {
width: 44px; height: 44px; border-radius: var(–r-sm);
border: 1.5px solid var(–border); background: var(–white);
cursor: pointer; display: flex; align-items: center;
justify-content: center; color: var(–muted); font-size: 18px;
flex-shrink: 0; transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}
.btn-back:active { border-color: var(–blue); color: var(–blue); }

.btn-next {
flex: 1; padding: 14px 20px; border-radius: var(–r-sm);
border: none; background: var(–blue); color: var(–white);
font-size: 15px; font-weight: 600;
display: flex; align-items: center; justify-content: center; gap: 8px;
cursor: pointer; transition: background 0.15s;
-webkit-tap-highlight-color: transparent;
}
.btn-next:active { background: var(–blue-dk); }

.btn-submit {
flex: 1; padding: 14px 20px; border-radius: var(–r-sm);
border: none; background: var(–green); color: var(–white);
font-size: 15px; font-weight: 600;
display: flex; align-items: center; justify-content: center; gap: 8px;
cursor: pointer; transition: background 0.15s;
-webkit-tap-highlight-color: transparent;
}
.btn-submit:active { background: var(–green-dk); }

/* Inline nav row (desktop) */
.nav-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }

/* Intro list */
.intro-list {
background: var(–white); border: 1px solid var(–border);
border-radius: var(–r); padding: 14px; margin-bottom: 20px;
}
.intro-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
.intro-item + .intro-item { border-top: 1px solid #f3f4f6; }
.intro-n {
width: 22px; height: 22px; border-radius: 6px;
background: var(–blue-pale); color: var(–blue);
display: flex; align-items: center; justify-content: center;
font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.intro-t { font-size: 13px; color: var(–text2); }

/* Goal banner */
.goal-banner {
background: linear-gradient(135deg, var(–navy) 0%, #253060 100%);
border-radius: var(–r); padding: 16px; margin-bottom: 18px;
display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.goal-val   { font-size: 22px; font-weight: 700; color: var(–white); }
.goal-lbl   { font-size: 11px; color: #93c5fd; margin-top: 2px; }
.goal-ico   {
width: 42px; height: 42px; border-radius: 10px;
background: rgba(26,86,219,0.3);
display: flex; align-items: center; justify-content: center;
font-size: 22px; flex-shrink: 0;
}

/* Limit badge */
.lim {
font-size: 10px; background: #fff7ed; border: 1px solid #fed7aa;
border-radius: var(–r-pill); padding: 2px 8px;
color: #c2410c; margin-left: 6px; font-weight: 600;
}

/* Review */
.review-card {
background: var(–white); border: 1px solid var(–border);
border-radius: var(–r); overflow: hidden; margin-bottom: 12px;
}
.review-head {
background: #f8faff; padding: 9px 16px;
border-bottom: 1px solid var(–border);
font-size: 10px; text-transform: uppercase;
letter-spacing: 0.08em; color: var(–blue); font-weight: 700;
}
.review-row {
display: flex; justify-content: space-between;
align-items: flex-start; padding: 10px 16px;
border-bottom: 1px solid #f3f4f6; gap: 12px;
}
.review-row:last-child { border-bottom: none; }
.rk { font-size: 12px; color: var(–muted); flex-shrink: 0; }
.rv { font-size: 12px; color: var(–text); font-weight: 500; text-align: right; word-break: break-word; max-width: 65%; }

/* Success */
.success-wrap { text-align: center; padding: 28px 0; }
.s-circle {
width: 72px; height: 72px; border-radius: 50%;
background: var(–blue); display: flex; align-items: center;
justify-content: center; font-size: 30px; color: var(–white);
margin: 0 auto 20px;
box-shadow: 0 8px 24px rgba(26,86,219,0.3);
}
.s-badge {
display: inline-flex; align-items: center; gap: 6px;
background: var(–blue-pale); border: 1px solid var(–blue-lt);
border-radius: var(–r-pill); padding: 8px 18px;
font-size: 12px; font-weight: 500; color: var(–blue); margin-top: 16px;
}

/* ============================================================
MOBILE LAYOUT  (default — applied to ALL screens first)
============================================================ */
.mob-shell {
display: flex;
flex-direction: column;
min-height: 100vh;
}

/* ── Top nav bar ── */
.mob-topbar {
background: var(–navy);
padding: 11px 16px;
display: flex; align-items: center;
justify-content: space-between; gap: 12px;
position: sticky; top: 0; z-index: 100;
}
.mob-brand { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.mob-logo-box {
width: 34px; height: 34px; border-radius: 8px;
overflow: hidden; flex-shrink: 0;
background: rgba(26,86,219,0.4);
border: 1.5px solid rgba(255,255,255,0.18);
display: flex; align-items: center; justify-content: center;
}
.mob-logo-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mob-name { font-size: 13px; font-weight: 600; color: var(–white); }
.mob-step-lbl { font-size: 10px; color: #93c5fd; margin-top: 1px; }
.mob-prog-col { flex: 1; min-width: 0; }
.mob-bar { height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
.mob-bar-fill {
height: 100%; background: var(–blue);
border-radius: 2px;
transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
}
.mob-meta { display: flex; justify-content: space-between; margin-top: 3px; }
.mob-meta span { font-size: 10px; color: rgba(255,255,255,0.4); }

/* ── Step segment track ── */
.mob-segs {
display: flex; gap: 3px;
padding: 10px 16px 0;
background: var(–bg);
}
.mob-seg {
flex: 1; height: 3px; border-radius: 2px;
background: #d1d5db; transition: background 0.3s;
}
.mob-seg.done   { background: #93c5fd; }
.mob-seg.active { background: var(–blue); }

/* ── Scroll area ── */
.mob-body {
flex: 1;
padding: 20px 16px 100px;
width: 100%;
max-width: 640px;
margin: 0 auto;
}

/* ── Fixed bottom footer ── */
.mob-footer {
position: fixed; bottom: 0; left: 0; right: 0;
background: var(–white); border-top: 1px solid var(–border);
padding: 10px 16px;
padding-bottom: calc(10px + env(safe-area-inset-bottom));
display: flex; align-items: center; gap: 10px;
z-index: 99; box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
}

/* Desktop wrapper hidden on mobile */
.desk-shell { display: none; }

/* ============================================================
TABLET  ≥ 640px  (still mobile layout, wider)
============================================================ */
@media (min-width: 640px) {
.mob-body { padding: 26px 24px 100px; }
.step-title { font-size: 24px; }
}

/* ============================================================
DESKTOP  ≥ 900px  — TWO COLUMN LAYOUT
============================================================ */
@media (min-width: 900px) {
body {
display: flex; align-items: center;
justify-content: center; padding: 28px;
background: #e8eaf0;
}

/* Hide mobile, show desktop */
.mob-shell { display: none; }
.desk-shell {
display: flex; flex-direction: column;
width: 100%; max-width: 980px;
background: var(–bg);
border-radius: 16px; overflow: hidden;
border: 1px solid var(–border);
box-shadow: 0 20px 60px rgba(0,0,0,0.1);
}

/* ── Desktop top bar ── */
.desk-topbar {
height: 52px; background: var(–white);
border-bottom: 1px solid var(–border);
display: flex; align-items: center;
justify-content: space-between;
padding: 0 22px; gap: 16px;
position: sticky; top: 0; z-index: 50;
}
.desk-brand { display: flex; align-items: center; gap: 10px; }
.desk-logo-box {
width: 32px; height: 32px; border-radius: 8px;
overflow: hidden; border: 1px solid var(–border);
background: #f3f4f6;
display: flex; align-items: center; justify-content: center;
}
.desk-logo-box img { width: 100%; height: 100%; object-fit: cover; }
.desk-brand-name { font-size: 13px; font-weight: 600; color: var(–text); }
.desk-prog-wrap {
flex: 1; max-width: 280px;
height: 3px; background: var(–border);
border-radius: 2px; overflow: hidden; margin: 0 16px;
}
.desk-prog-fill {
height: 100%; background: var(–blue);
transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
}
/* Topbar pills */
.desk-pills { display: flex; gap: 6px; }
.pill {
display: flex; align-items: center; gap: 5px;
padding: 3px 9px; border-radius: var(–r-pill);
font-size: 11px; font-weight: 500; white-space: nowrap;
}
.pill-done   { background: var(–blue-pale); color: var(–blue); }
.pill-active { background: var(–blue); color: var(–white); }
.pill-idle   { background: #f3f4f6; color: #9ca3af; }
.pill-n {
width: 15px; height: 15px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 9px; font-weight: 600;
}
.pill-done .pill-n   { background: var(–blue); color: var(–white); }
.pill-active .pill-n { background: rgba(255,255,255,0.22); color: var(–white); }
.pill-idle .pill-n   { background: #e5e7eb; color: #9ca3af; }

/* ── Two-column body ── */
.desk-main { display: flex; min-height: 540px; }

/* Sidebar */
.desk-sidebar {
width: 240px; flex-shrink: 0;
background: var(–navy);
padding: 28px 20px;
display: flex; flex-direction: column; gap: 5px;
}
.sb-logo {
width: 56px; height: 56px; border-radius: 12px; overflow: hidden;
margin-bottom: 14px;
border: 2px solid rgba(255,255,255,0.12);
background: rgba(26,86,219,0.3);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.sb-logo img { width: 100%; height: 100%; object-fit: cover; }
.sb-badge {
display: inline-flex; align-items: center; gap: 5px;
background: rgba(26,86,219,0.22);
border: 1px solid rgba(59,130,246,0.28);
border-radius: var(–r-pill);
padding: 3px 10px; margin-bottom: 10px; width: fit-content;
}
.sb-dot {
width: 5px; height: 5px; border-radius: 50%;
background: #60a5fa;
animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sb-badge-txt { font-size: 11px; color: #93c5fd; font-weight: 500; }
.sb-title { font-size: 15px; font-weight: 600; color: var(–white); line-height: 1.35; margin-bottom: 4px; }
.sb-sub   { font-size: 12px; color: #6b7280; line-height: 1.5; margin-bottom: 16px; }
/* Sidebar step list */
.sb-step {
display: flex; align-items: center; gap: 8px;
padding: 6px 10px; border-radius: var(–r-sm);
transition: background 0.2s;
}
.sb-step.now  { background: rgba(26,86,219,0.15); }
.sb-step-dot  {
width: 6px; height: 6px; border-radius: 50%;
background: #374151; flex-shrink: 0; transition: background 0.2s;
}
.sb-step.done .sb-step-dot { background: #93c5fd; }
.sb-step.now  .sb-step-dot { background: var(–blue); }
.sb-step-lbl { font-size: 12px; color: #4b5563; transition: color 0.2s; }
.sb-step.done .sb-step-lbl { color: #6b7280; }
.sb-step.now  .sb-step-lbl { color: var(–white); font-weight: 500; }
/* Stat box */
.sb-stat {
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 10px; padding: 12px; margin-top: auto;
}
.sb-stat-val { font-size: 20px; font-weight: 700; color: var(–white); }
.sb-stat-lbl { font-size: 11px; color: #6b7280; margin-top: 2px; }

/* Right content */
.desk-content {
flex: 1; background: var(–bg);
display: flex; align-items: flex-start;
justify-content: center; padding: 36px 32px;
overflow-y: auto;
}
.desk-form { width: 100%; max-width: 460px; }
}

/* ============================================================
LARGE DESKTOP  ≥ 1200px
============================================================ */
@media (min-width: 1200px) {
.desk-shell { max-width: 1060px; }
.desk-sidebar { width: 255px; }
}

/* ============================================================
VERY SMALL PHONES  < 380px
============================================================ */
@media (max-width: 379px) {
.oc-grid  { grid-template-columns: 1fr; }
.amt-grid { grid-template-columns: 1fr; }
.step-title { font-size: 19px; }
}

/* ============================================================
REDUCED MOTION
============================================================ */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
transition-duration: 0.01ms !important;
}
}
</style>

</head>
<body>

<!-- ══════════════════════════════════════════
     MOBILE LAYOUT  (shown below 900px)
══════════════════════════════════════════ -->

<div class="mob-shell">

  <!-- Sticky top bar -->

  <div class="mob-topbar">
    <div class="mob-brand">
      <div class="mob-logo-box" id="m-logo-box">
        <i class="ti ti-cross" style="color:#93c5fd;font-size:15px"></i>
      </div>
      <div>
        <div class="mob-name">Good Shepherd</div>
        <div class="mob-step-lbl" id="m-step-lbl">Welcome</div>
      </div>
    </div>
    <div class="mob-prog-col">
      <div class="mob-bar">
        <div class="mob-bar-fill" id="m-bar" style="width:0%"></div>
      </div>
      <div class="mob-meta">
        <span id="m-step-count">Intro</span>
        <span id="m-pct">0%</span>
      </div>
    </div>
  </div>

  <!-- Step segment track -->

  <div class="mob-segs" id="m-segs"></div>

  <!-- Scrollable form body -->

  <div class="mob-body">
    <div id="m-content" class="slide-up"></div>
  </div>

  <!-- Fixed bottom nav -->

  <div class="mob-footer" id="m-footer"></div>

</div>

<!-- ══════════════════════════════════════════
     DESKTOP LAYOUT  (shown 900px+)
══════════════════════════════════════════ -->

<div class="desk-shell">

  <!-- Top bar -->

  <div class="desk-topbar">
    <div class="desk-brand">
      <div class="desk-logo-box" id="d-logo-box">
        <i class="ti ti-cross" style="color:var(--blue);font-size:14px"></i>
      </div>
      <span class="desk-brand-name">Good Shepherd Parish</span>
    </div>
    <div class="desk-prog-wrap">
      <div class="desk-prog-fill" id="d-bar" style="width:0%"></div>
    </div>
    <div class="desk-pills" id="d-pills"></div>
  </div>

  persist(); render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goBack() {
  step--; errs = {}; render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function submitForm() {
  var e = validate(step);
  if (Object.keys(e).length) { errs = e; render(); return; }
  step = 10;
  try { localStorage.removeItem('gs26'); } catch(e2) {}
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* expose globally for onclick handlers */
window.goNext = goNext;
window.goBack = goBack;
window.submitForm = submitForm;

/* ========================================================
   VALIDATION
======================================================== */
function validate(s) {
  var e = {};
  if (s === 1) {
    if (!D.role) e.role = 'Please select who you are.';
    if (D.role === 'Other' && !D.roleOther.trim()) e.roleOther = 'Please specify.';
  }
  if (s === 2) {
    if (!D.method) e.method = 'Please select a giving method.';
    if (D.method === 'Other' && !D.methodOther.trim()) e.methodOther = 'Please specify.';
  }
  if (s === 3) {
    if (!D.pledgeFreq) e.pledgeFreq = 'Please select an option.';
    if (D.pledgeFreq && D.pledgeFreq !== 'No' && !D.pledgeAmt) e.pledgeAmt = 'Please select an amount.';
  }
  if (s === 4 && D.activities.length === 0) e.activities = 'Select at least one activity.';
  if (s === 5 && !D.livestream) e.livestream = 'Please select an option.';
  if (s === 8) {
    if (D.phone && !/^(0[235][0-9]{8}|\+233[235][0-9]{8})$/.test(D.phone.replace(/\s/g, '')))
      e.phone = 'Enter a valid Ghana number (e.g. 0241234567).';
    if (D.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(D.email))
      e.email = 'Enter a valid email address.';
  }
  return e;
}

/* ========================================================

function buildSidebar() {
return STEP_NAMES.map(function(l, i) {
var cls = i < step ? ‘done’ : i === step ? ‘now’ : ‘’;
return ‘<div class="sb-step '+cls+'"><div class="sb-step-dot"></div><span class="sb-step-lbl">’+l+’</span></div>’;

/* ========================================================
TOP PILLS  (desktop)
======================================================== */
function buildPills() {
var from = Math.max(0, step - 1);
var slice = SHORT.slice(from, from + 4);
return slice.map(function(l, i) {
var abs = from + i;
var cls = abs < step ? ‘pill-done’ : abs === step ? ‘pill-active’ : ‘pill-idle’;
var n = abs < step ? ‘<i class="ti ti-check" style="font-size:8px"></i>’ : String(abs + 1);
return ‘<div class="pill '+cls+'"><div class="pill-n">’+n+’</div>’+l+’</div>’;
}).join(’’);
}

/* ========================================================
MOBILE SEGMENT TRACK
======================================================== */
function buildSegs() {
var html = ‘’;
for (var i = 0; i < 9; i++) {
var cls = i < step ? ‘done’ : i === step ? ‘active’ : ‘’;
html += ‘<div class="mob-seg '+cls+'"></div>’;
}
return html;
}

MAIN RENDER
======================================================== */

var pct = step >= 10 ? 100 : Math.round((step / 9) * 100);

/* ── MOBILE ── */
document.getElementById(‘m-bar’).style.width = pct + ‘%’;
document.getElementById(‘m-pct’).textContent = pct + ‘%’;
document.getElementById(‘m-step-lbl’).textContent = step < 10 ? STEP_NAMES[step] : ‘Complete!’;
document.getElementById(‘m-step-count’).textContent = step === 0 ? ‘Intro’ : step < 10 ? ‘Step ’ + step + ’ of 9’ : ‘Done’;
document.getElementById(‘m-segs’).innerHTML = buildSegs();

var mContent = document.getElementById(‘m-content’);
mContent.innerHTML = buildContent(false);
mContent.classList.remove(‘slide-up’);
void mContent.offsetWidth;
mContent.classList.add(‘slide-up’);

var mFooter = document.getElementById(‘m-footer’);
var footerHTML = mobileFooterHTML();
mFooter.innerHTML = footerHTML;
mFooter.style.display = step === 10 ? ‘none’ : ‘flex’;

/* ── DESKTOP ── */
document.getElementById(‘d-bar’).style.width = pct + ‘%’;
document.getElementById(‘d-pills’).innerHTML = step < 10 ? buildPills() : ‘’;
document.getElementById(‘d-sb-steps’).innerHTML = buildSidebar();

var dContent = document.getElementById(‘d-content’);
dContent.innerHTML = buildContent(true);
dContent.classList.remove(‘slide-up’);
void dContent.offsetWidth;
dContent.classList.add(‘slide-up’);
}

/* ========================================================
LOGO INJECTION
────────────────────────────────────────────────────────
To add your logo, replace the empty string below with:
• A base64 string:  “data:image/jpeg;base64,/9j/…”
• A relative URL:   “./logo.jpg”
• A full URL:       “https://example.com/logo.png”
======================================================== */
var LOGO_SRC = ‘’;  /* ← paste your logo here */

if (LOGO_SRC) {
function setLogo(boxId, fallbackHTML) {
var box = document.getElementById(boxId);
if (!box) return;
var img = document.createElement(‘img’);
img.src = LOGO_SRC;
img.alt = ‘Good Shepherd Parish’;
img.onerror = function() { box.innerHTML = fallbackHTML; };
box.innerHTML = ‘’;
box.appendChild(img);
}
setLogo(‘m-logo-box’,   ‘<i class="ti ti-cross" style="color:#93c5fd;font-size:15px"></i>’);
setLogo(‘d-logo-box’,   ‘<i class="ti ti-cross" style="color:var(--blue);font-size:14px"></i>’);
setLogo(‘d-sb-logo’,    ‘<i class="ti ti-cross" style="color:#93c5fd;font-size:22px"></i>’);
}

/* ── BOOT ── */
render();
</script>
